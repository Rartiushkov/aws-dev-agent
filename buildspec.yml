version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - pip install -r requirements.txt
  build:
    commands:
      - mkdir -p reports
      - bash -c 'set -o pipefail; python -m unittest discover -s tests -t . -p "test_*.py" 2>&1 | tee reports/unittest.txt'

artifacts:
  files:
    - reports/**/*
    - project.md
    - response.json
  discard-paths: no

reports:
  aws_dev_agent_reports:
    files:
      - unittest.txt
    base-directory: reports
    file-format: RAW
