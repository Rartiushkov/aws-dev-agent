<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="22" fill="#5cdc96"/>

  <!-- Body (viewed from top) -->
  <ellipse cx="50" cy="54" rx="22" ry="18" fill="#0a0a0a"/>

  <!-- Shell dome highlight -->
  <ellipse cx="50" cy="52" rx="14" ry="11" fill="#1a1a1a"/>

  <!-- Shell pattern lines -->
  <!-- center vertical -->
  <path d="M50 41 L50 63" stroke="#5cdc96" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <!-- center horizontal -->
  <path d="M36 52 L64 52" stroke="#5cdc96" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <!-- diagonals -->
  <path d="M40 43 L44 61" stroke="#5cdc96" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <path d="M60 43 L56 61" stroke="#5cdc96" stroke-width="1" stroke-linecap="round" opacity="0.4"/>

  <!-- Head -->
  <circle cx="50" cy="34" r="6" fill="#0a0a0a"/>
  <!-- eyes -->
  <circle cx="47" cy="32.5" r="1.2" fill="#5cdc96"/>
  <circle cx="53" cy="32.5" r="1.2" fill="#5cdc96"/>

  <!-- Front legs -->
  <ellipse cx="25" cy="46" rx="5" ry="3" fill="#0a0a0a" transform="rotate(-35 25 46)"/>
  <ellipse cx="75" cy="46" rx="5" ry="3" fill="#0a0a0a" transform="rotate(35 75 46)"/>

  <!-- Back legs -->
  <ellipse cx="27" cy="66" rx="5" ry="3" fill="#0a0a0a" transform="rotate(25 27 66)"/>
  <ellipse cx="73" cy="66" rx="5" ry="3" fill="#0a0a0a" transform="rotate(-25 73 66)"/>

  <!-- Tail -->
  <ellipse cx="50" cy="74" rx="3" ry="4.5" fill="#0a0a0a"/>
</svg>
