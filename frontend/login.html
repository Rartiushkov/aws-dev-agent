<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShellShift – Sign in</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%235cdc96'/><text x='50' y='72' font-size='62' text-anchor='middle'>&#x1F422;</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0d0d;
      --surface: #1a1a1a;
      --border:  rgba(255,255,255,0.08);
      --border-md: rgba(255,255,255,0.13);
      --text:    #ffffff;
      --muted:   #a3a3a3;
      --dim:     rgba(255,255,255,0.28);
      --accent:  #5cdc96;
      --radius:  10px;
      --font:    "Inter", -apple-system, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border-md);
      border-radius: 14px;
      padding: 40px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .login-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .login-brand-mark {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: var(--accent);
      display: grid; place-items: center;
      flex-shrink: 0;
    }
    .login-brand-name {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .login-heading {
      text-align: center;
    }
    .login-title {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 6px;
    }
    .login-sub {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
    }

    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 13px 20px;
      background: #ffffff;
      color: #1a1a1a;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 140ms, box-shadow 140ms;
    }
    .btn-google:hover {
      background: #f0f0f0;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
    }
    .btn-google:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-google svg { flex-shrink: 0; }

    .login-error {
      width: 100%;
      padding: 10px 14px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 8px;
      font-size: 12px;
      color: #f87171;
      text-align: center;
      display: none;
    }
    .login-error.visible { display: block; }

    .login-footer {
      font-size: 11px;
      color: var(--dim);
      text-align: center;
      line-height: 1.6;
    }
    .login-footer a { color: var(--muted); text-decoration: none; }
    .login-footer a:hover { color: var(--text); }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,0.15);
      border-top-color: #1a1a1a;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn-google.loading .spinner { display: block; }
    .btn-google.loading .btn-google-label { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <a href="./index.html" class="login-brand">
    <div class="login-brand-mark">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2 8h12M9 3l5 5-5 5" stroke="#050505" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="login-brand-name">ShellShift</span>
  </a>

  <div class="login-card">
    <div class="login-heading">
      <div class="login-title">Sign in to ShellShift</div>
      <div class="login-sub">Manage your AWS migrations from one place.</div>
    </div>

    <div class="divider"></div>

    <button class="btn-google" id="btn-google" type="button">
      <svg width="18" height="18" viewBox="0 0 18 18" class="btn-google-label">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      <span class="btn-google-label">Continue with Google</span>
      <div class="spinner"></div>
    </button>

    <div class="login-error" id="login-error"></div>

    <div class="login-footer">
      By signing in you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.<br/>
      © 2026 ShellShift Technologies, Inc.
    </div>
  </div>

  <script type="module">
    import { signInWithGoogle, watchAuth } from './auth.js';
    import { upsertUser } from './db.js';

    // If already signed in — upsert profile then go to dashboard
    watchAuth(async (user) => {
      if (user) {
        await upsertUser(user).catch(e => console.error('[db] upsertUser error:', e.code, e.message));
        window.location.replace('./dashboard.html');
      }
    });

    // Add back link dynamically
    const backLink = document.createElement('a');
    backLink.href = '/index.html';
    backLink.textContent = '← Back to home';
    backLink.style.cssText = 'display:block;text-align:center;margin-top:20px;font-size:13px;color:#a3a3a3;text-decoration:none;';
    backLink.onmouseover = () => backLink.style.color = '#fff';
    backLink.onmouseout  = () => backLink.style.color = '#a3a3a3';
    document.querySelector('.login-card')?.after(backLink);

    const btn   = document.getElementById('btn-google');
    const error = document.getElementById('login-error');

    btn.addEventListener('click', async () => {
      btn.classList.add('loading');
      btn.disabled = true;
      error.classList.remove('visible');
      try {
        const user = await signInWithGoogle();
        await upsertUser(user).catch(() => {});
        // watchAuth will redirect
      } catch (e) {
        btn.classList.remove('loading');
        btn.disabled = false;
        error.textContent = e.message || 'Sign-in failed. Please try again.';
        error.classList.add('visible');
      }
    });
  </script>
</body>
</html>
